<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070707" />
    <title>TradeIQ Pro offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070707;
        color: #f7f4ea;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 12% 8%, rgba(212, 175, 55, 0.16), transparent 28rem),
          radial-gradient(circle at 88% 84%, rgba(34, 197, 94, 0.13), transparent 24rem),
          #070707;
      }

      main {
        width: min(92vw, 560px);
        border: 1px solid rgba(212, 175, 55, 0.32);
        background: rgba(20, 21, 23, 0.86);
        padding: 32px;
      }

      p {
        color: #b8bec6;
        line-height: 1.6;
      }

      a {
        color: #f2d271;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TradeIQ Pro ist gerade offline.</h1>
      <p>
        Die App ist installiert, aber fuer Live-Signale, Login, Zahlungen und Marktdaten wird eine
        Internetverbindung benoetigt.
      </p>
      <p><a href="/">Erneut verbinden</a></p>
    </main>
  </body>
</html>
